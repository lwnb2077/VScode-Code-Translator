# Cursor / VSCodium 等使用的扩展索引来自 Open VSX（open-vsx.org），非微软 Marketplace。
# 在 GitHub 仓库 Settings → Secrets → Actions 中添加 OVSX_PAT（Open VSX 个人访问令牌）。
name: Publish to Open VSX

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Publish extension
        run: npx --yes ovsx publish
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
